<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll — Suriname</title>
<style>
  :root{
    --ink: #17261f;
    --paper: #faf9f5;
    --paper-raised: #ffffff;
    --green-deep: #1b4332;
    --green-mid: #2d6a4f;
    --green-soft: #e8f0ea;
    --gold: #b8902e;
    --gold-soft: #f3e9d2;
    --red-line: #9b2c2c;
    --line: #dcd8ce;
    --muted: #6b7268;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(23,38,31,0.06), 0 4px 14px rgba(23,38,31,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .num, .amount, table.data td.num{
    font-variant-numeric: tabular-nums;
    font-family: 'Consolas', 'SFMono-Regular', ui-monospace, Menlo, monospace;
  }
  header.app-header{
    background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
    color: #f4f1e6;
    padding: 22px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    border-bottom: 3px solid var(--gold);
  }
  header.app-header .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  header.app-header .star{
    width:34px;height:34px;
    color: var(--gold);
    flex-shrink:0;
  }
  header.app-header h1{
    font-size:19px;
    margin:0;
    font-weight:700;
    letter-spacing:0.2px;
  }
  header.app-header .sub{
    font-size:12.5px;
    color:#d9e5dc;
    margin-top:2px;
  }
  .lang-toggle{
    display:flex;
    border:1px solid rgba(244,241,230,0.4);
    border-radius:7px;
    overflow:hidden;
  }
  .lang-toggle button{
    border:none;
    background:transparent;
    color:#f4f1e6;
    padding:7px 12px;
    font-size:12.5px;
    font-weight:700;
    cursor:pointer;
  }
  .lang-toggle button.active{
    background:var(--gold);
    color:#2b210a;
  }
  nav.tabs{
    display:flex;
    gap:4px;
    padding: 0 28px;
    background:var(--paper-raised);
    border-bottom:1px solid var(--line);
    overflow-x:auto;
  }
  nav.tabs button{
    border:none;
    background:transparent;
    padding:14px 16px;
    font-size:14px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
    border-bottom:3px solid transparent;
    white-space:nowrap;
  }
  nav.tabs button.active{
    color:var(--green-deep);
    border-bottom-color:var(--gold);
  }
  main{
    max-width:1100px;
    margin:0 auto;
    padding:24px 28px 80px;
  }
  .panel{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px;
    margin-bottom:20px;
  }
  .panel h2{
    font-size:15px;
    margin:0 0 4px;
    color:var(--green-deep);
  }
  .panel .hint{
    font-size:12.5px;
    color:var(--muted);
    margin:0 0 16px;
  }
  .row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:5px;
    flex:1;
    min-width:160px;
  }
  .field label{
    font-size:12px;
    font-weight:600;
    color:var(--muted);
  }
  .field input, .field select{
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    font-size:14px;
    background:#fff;
    color:var(--ink);
    font-family:inherit;
  }
  .field input:focus, .field select:focus{
    outline:2px solid var(--green-mid);
    outline-offset:1px;
  }
  .field .note{
    font-size:11px;
    color:var(--muted);
  }
  table.data{
    width:100%;
    border-collapse:collapse;
    font-size:13.5px;
  }
  table.data th{
    text-align:left;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.03em;
    color:var(--muted);
    border-bottom:2px solid var(--line);
    padding:8px 10px;
    white-space:nowrap;
  }
  table.data td{
    padding:9px 10px;
    border-bottom:1px solid var(--line);
    vertical-align:middle;
  }
  table.data td.num{ text-align:right; }
  table.data tr:hover{ background:var(--green-soft); }
  .btn{
    border:none;
    border-radius:7px;
    padding:9px 15px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }
  .btn-primary{ background:var(--green-deep); color:#fff; }
  .btn-primary:hover{ background:var(--green-mid); }
  .btn-gold{ background:var(--gold); color:#2b210a; }
  .btn-gold:hover{ filter:brightness(1.06); }
  .btn-ghost{ background:transparent; color:var(--green-deep); border:1px solid var(--line); }
  .btn-ghost:hover{ background:var(--green-soft); }
  .btn-danger{ background:transparent; color:var(--red-line); border:1px solid transparent; }
  .btn-danger:hover{ text-decoration:underline; }
  .btn-sm{ padding:5px 9px; font-size:12px; }
  .toolbar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }
  .summary-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:12px;
    margin-bottom:20px;
  }
  .card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    box-shadow:var(--shadow);
  }
  .card .label{
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.03em;
    color:var(--muted);
    margin-bottom:6px;
  }
  .card .value{
    font-size:21px;
    font-weight:700;
    color:var(--green-deep);
    font-family:'Consolas', ui-monospace, monospace;
  }
  .card.gold .value{ color:#8a6a1c; }
  .bracket-table{ margin-top:10px; }
  .payslip-list{ display:flex; flex-direction:column; gap:8px; }
  .payslip-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
    cursor:pointer;
  }
  .payslip-row .name{ font-weight:600; }
  .payslip-row .amount{ color:var(--green-deep); font-weight:700; }
  .empty-state{
    text-align:center;
    padding:40px 20px;
    color:var(--muted);
  }
  .empty-state .glyph{ font-size:34px; margin-bottom:8px; }
  footer.foot{
    text-align:center;
    padding:24px;
    font-size:11.5px;
    color:var(--muted);
  }
  .badge{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    padding:2px 7px;
    border-radius:20px;
    background:var(--gold-soft);
    color:#8a6a1c;
    margin-left:6px;
    vertical-align:middle;
  }
  .disclaimer{
    background:var(--gold-soft);
    border:1px solid #e6d4a3;
    border-radius:8px;
    padding:12px 14px;
    font-size:12.5px;
    color:#5c4a1a;
    line-height:1.5;
    margin-bottom:20px;
  }
  .disclaimer b{ color:#4a3a14; }

  /* Employee cards */
  .emp-card{
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
    background:#fffdf9;
  }
  .emp-card-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    gap:10px;
  }
  .emp-card-head .name-field{
    flex:1;
  }
  .emp-card-head input.emp-name{
    font-size:16px;
    font-weight:700;
    border:1px solid transparent;
    background:transparent;
    padding:4px 6px;
    border-radius:6px;
    width:100%;
    color:var(--green-deep);
    font-family:inherit;
  }
  .emp-card-head input.emp-name:hover{ border-color:var(--line); }
  .emp-card-head input.emp-name:focus{ outline:none; border-color:var(--green-mid); background:#fff; }
  .emp-section-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--muted);
    margin:12px 0 8px;
  }
  .emp-section-label:first-of-type{ margin-top:0; }
  .emp-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
    gap:10px;
  }
  .emp-grid .field label{ font-size:11px; }
  .emp-grid .field input, .emp-grid .field select{ padding:7px 9px; font-size:13px; }

  /* Payslip modal / print */
  .overlay{
    position:fixed; inset:0;
    background:rgba(23,38,31,0.45);
    display:flex; align-items:flex-start; justify-content:center;
    padding:40px 16px;
    overflow:auto;
    z-index:50;
  }
  .overlay.hidden{ display:none; }
  .slip{
    background:#fff;
    width:100%;
    max-width:560px;
    border-radius:10px;
    padding:32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
  }
  .slip-head{
    display:flex; justify-content:space-between; align-items:flex-start;
    border-bottom:3px solid var(--gold);
    padding-bottom:14px;
    margin-bottom:16px;
  }
  .slip-head h2{ margin:0; font-size:18px; color:var(--green-deep); }
  .slip-head .co{ font-size:13px; color:var(--muted); margin-top:3px; }
  .slip-head .period{ text-align:right; font-size:13px; color:var(--muted); }
  .slip-section{ margin-bottom:14px; }
  .slip-section h4{
    font-size:11px; text-transform:uppercase; letter-spacing:0.04em;
    color:var(--muted); margin:0 0 8px;
  }
  .slip-line{
    display:flex; justify-content:space-between;
    padding:5px 0;
    font-size:13.5px;
    border-bottom:1px dashed var(--line);
  }
  .slip-line.total{
    border-bottom:none;
    border-top:2px solid var(--ink);
    margin-top:6px;
    padding-top:10px;
    font-weight:700;
    font-size:15px;
  }
  .slip-line .amt{ font-family:'Consolas', ui-monospace, monospace; }
  .slip-actions{ display:flex; gap:8px; margin-top:20px; }
  @media print{
    body *{ visibility:hidden; }
    .slip, .slip *{ visibility:visible; }
    .slip{ position:absolute; top:0; left:0; box-shadow:none; max-width:100%; }
    .slip-actions{ display:none; }
    .overlay{ position:static; padding:0; background:none; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <svg class="star" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 14.7,9.1 22,9.6 16.3,14.3 18.2,21.4 12,17.3 5.8,21.4 7.7,14.3 2,9.6 9.3,9.1"/></svg>
    <div>
      <h1 id="companyHeading">Payroll</h1>
      <div class="sub" id="companySub">Monthly wage &amp; tax calculator — Suriname</div>
    </div>
  </div>
  <div class="row" style="gap:10px; align-items:center;">
    <div class="lang-toggle">
      <button id="langEN" onclick="setLang('en')">EN</button>
      <button id="langNL" onclick="setLang('nl')">NL</button>
    </div>
    <button class="btn btn-ghost btn-sm" id="btnSave" onclick="exportData()"></button>
    <label class="btn btn-ghost btn-sm" style="cursor:pointer;" id="btnLoadLabel">
      <input type="file" accept="application/json" style="display:none" onchange="importData(event)">
    </label>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="run" id="navRun"></button>
  <button class="tab-btn" data-tab="employees" id="navEmployees"></button>
  <button class="tab-btn" data-tab="settings" id="navSettings"></button>
  <button class="tab-btn" data-tab="about" id="navAbout"></button>
</nav>

<main>

  <div class="disclaimer" id="disclaimerText"></div>

  <!-- ============ PAYROLL RUN TAB ============ -->
  <section id="tab-run" class="tab-panel">
    <div class="panel">
      <h2 id="periodTitle"></h2>
      <p class="hint" id="periodHint"></p>
      <div class="row">
        <div class="field">
          <label id="lblCompanyName"></label>
          <input id="companyName" type="text" oninput="onCompanyNameChange()">
        </div>
        <div class="field">
          <label id="lblPayPeriod"></label>
          <input id="payPeriod" type="month" oninput="renderAll()">
        </div>
      </div>
    </div>

    <div id="summaryCards" class="summary-cards"></div>

    <div class="panel">
      <div class="toolbar" style="justify-content:space-between;">
        <h2 style="margin:0;" id="payrollTableTitle"></h2>
        <div class="row" style="gap:8px;">
          <button class="btn btn-ghost btn-sm" id="btnExportCSV" onclick="exportCSV()"></button>
        </div>
      </div>
      <p class="hint" id="payrollTableHint"></p>
      <div id="runTableWrap"></div>
    </div>

    <div class="panel">
      <h2 id="payslipsTitle"></h2>
      <p class="hint" id="payslipsHint"></p>
      <div id="payslipList" class="payslip-list"></div>
    </div>
  </section>

  <!-- ============ EMPLOYEES TAB ============ -->
  <section id="tab-employees" class="tab-panel" style="display:none;">
    <div class="panel">
      <div class="toolbar" style="justify-content:space-between;">
        <h2 style="margin:0;" id="employeesTitle"></h2>
        <button class="btn btn-primary btn-sm" id="btnAddEmployee" onclick="addEmployee()"></button>
      </div>
      <p class="hint" id="employeesHint"></p>
      <div id="employeeCardsWrap"></div>
    </div>
  </section>

  <!-- ============ SETTINGS TAB ============ -->
  <section id="tab-settings" class="tab-panel" style="display:none;">
    <div class="panel">
      <h2 id="wageTaxTitle"></h2>
      <p class="hint" id="wageTaxHint"></p>
      <div class="row">
        <div class="field"><label id="lblTaxFree"></label><input id="taxFreeAllowance" class="num" type="number" step="1" oninput="renderAll()"></div>
        <div class="field"><label id="lblProfExpense"></label><input id="profExpense" class="num" type="number" step="1" oninput="renderAll()"></div>
      </div>
      <table class="data bracket-table">
        <thead><tr><th id="bracketColHead"></th><th id="rateColHead"></th></tr></thead>
        <tbody id="bracketBody"></tbody>
      </table>
    </div>

    <div class="panel">
      <h2 id="ssTitle"></h2>
      <p class="hint" id="ssHint"></p>
      <div class="row">
        <div class="field">
          <label id="lblAOV"></label>
          <input id="rateAOV" class="num" type="number" step="0.1" oninput="renderAll()">
          <span class="note" id="noteAOV"></span>
        </div>
        <div class="field">
          <label id="lblSZF"></label>
          <input id="rateSZF" class="num" type="number" step="0.1" oninput="renderAll()">
          <span class="note" id="noteSZF"></span>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ ABOUT TAB ============ -->
  <section id="tab-about" class="tab-panel" style="display:none;">
    <div class="panel">
      <h2 id="aboutCalcTitle"></h2>
      <ol id="aboutCalcList" style="font-size:13.5px; line-height:1.9; color:var(--ink);"></ol>
    </div>
    <div class="panel">
      <h2 id="aboutWhatTitle"></h2>
      <p id="aboutWhatText" style="font-size:13.5px; line-height:1.7;"></p>
    </div>
  </section>

</main>

<footer class="foot" id="footerText"></footer>

<div id="slipOverlay" class="overlay hidden" onclick="if(event.target===this) closeSlip()">
  <div class="slip" id="slipContent"></div>
</div>

// ---------- Tax logic ----------
const BRACKETS = [
  {upTo: 3500, rate: 0.08},
  {upTo: 7000, rate: 0.18},
  {upTo: 10500, rate: 0.28},
  {upTo: Infinity, rate: 0.38}
];

function computeWageTax(taxableIncome){
  if(taxableIncome <= 0) return 0;
  let tax = 0;
  let lower = 0;
  for(const b of BRACKETS){
    if(taxableIncome > lower){
      const bandAmount = Math.min(taxableIncome, b.upTo) - lower;
      tax += bandAmount * b.rate;
      lower = b.upTo;
    } else break;
  }
  return tax;
}

function computePayslip(emp){
  const s = state.settings;
  const gross = emp.payType === 'monthly'
    ? Number(emp.monthlySalary || 0)
    : Number(emp.hourlyRate || 0) * Number(emp.hoursWorked || 0);
  const grossTotal = gross + Number(emp.extraAllowance || 0);

  const aov = grossTotal * (Number(s.rateAOV || 0) / 100);
  const szf = grossTotal * (Number(s.rateSZF || 0) / 100);
  const socialSecurity = aov + szf;

  let taxable = grossTotal - socialSecurity - Number(s.profExpense || 0) - Number(s.taxFreeAllowance || 0);
  if(taxable < 0) taxable = 0;

  const wageTax = computeWageTax(taxable);
  const otherDeduction = Number(emp.otherDeduction || 0);
  const net = grossTotal - socialSecurity - wageTax - otherDeduction;

  return { gross: grossTotal, aov, szf, socialSecurity, taxable, wageTax, otherDeduction, net };
}

function escapeAttr(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function addEmployee(){
  state.employees.push(newEmployee());
  renderAll();
  switchTab('employees');
}
function removeEmployee(id){
  state.employees = state.employees.filter(e=>e.id!==id);
  renderAll();
}
function updateEmp(id, field, value){
  const emp = state.employees.find(e=>e.id===id);
  if(!emp) return;
  const numericFields = ['monthlySalary','hourlyRate','hoursWorked','extraAllowance','otherDeduction'];
  emp[field] = numericFields.includes(field) ? Number(value||0) : value;
  renderAll();
}

function exportData(){
  saveSettingsFromInputs();
  const blob = new Blob([JSON.stringify(Object.assign({lang}, state), null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const label = (state.companyName || 'payroll').replace(/[^a-z0-9]+/gi,'-').toLowerCase();
  a.href = url;
  a.download = `${label}-${state.payPeriod}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const loaded = JSON.parse(e.target.result);
      state = Object.assign(state, loaded);
      if(loaded.lang) lang = loaded.lang;
      hydrateInputs();
      applyStaticText();
      renderAll();
    }catch(err){
      alert(t('importError'));
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function exportCSV(){
  let lines = [[t('colEmployee'),t('fPosition'),t('fType'),t('fNationality'),t('fAddress'),t('fPhone'),t('fDOB'),t('fIDNumber'),t('fPaymentMethod'),t('fBankName'),t('fBankAccount'),t('colGross'),t('colSS'),t('colTaxable'),t('colTax'),t('colOther'),t('colNet')].join(',')];
  state.employees.forEach(emp=>{
    const p = computePayslip(emp);
    lines.push([emp.name, emp.position, emp.type, emp.nationality, emp.address, emp.phone, emp.dob, emp.idNumber, emp.paymentMethod, emp.bankName, emp.bankAccount, p.gross.toFixed(2), p.socialSecurity.toFixed(2), p.taxable.toFixed(2), p.wageTax.toFixed(2), p.otherDeduction.toFixed(2), p.net.toFixed(2)]
      .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  });
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const label = (state.companyName || 'payroll').replace(/[^a-z0-9]+/gi,'-').toLowerCase();
  a.href = url;
  a.download = `${label}-${state.payPeriod}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function hydrateInputs(){
  document.getElementById('companyName').value = state.companyName || '';
  document.getElementById('payPeriod').value = state.payPeriod || '';
  document.getElementById('taxFreeAllowance').value = state.settings.taxFreeAllowance;
  document.getElementById('profExpense').value = state.settings.profExpense;
  document.getElementById('rateAOV').value = state.settings.rateAOV;
  document.getElementById('rateSZF').value = state.settings.rateSZF;
}

// ---------- Init ----------
applyStaticText();
hydrateInputs();
renderAll();
</script>
